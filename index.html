<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Clone</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f3f3;
}

header{
    background:#131921;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.cart{
    font-size:20px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

button{
    background:#febd69;
    border:none;
    padding:10px;
    width:100%;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#f3a847;
}
</style>
</head>

<body>

<header>
    <div class="logo">Amazon Clone</div>
    <div class="cart">
        🛒 Cart: <span id="count">0</span>
    </div>
</header>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500">
<h3>Running Shoes</h3>
<p>₹1999</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500">
<h3>Smart Watch</h3>
<p>₹2999</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500">
<h3>Headphones</h3>
<p>₹1499</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500">
<h3>Smartphone</h3>
<p>₹14999</p>
<button onclick="addCart()">Add to Cart</button>
</div>

</div>

<script>
let cart=0;

function addCart(){
    cart++;
    document.getElementById("count").innerText=cart;
}
</script>

</body>
</html>
