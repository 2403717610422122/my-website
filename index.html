<!DOCTYPE html>
<html>
<head>
    <title>AI Chat Website</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#0f172a;
            color:white;
            margin:0;
        }

        .container{
            max-width:800px;
            margin:auto;
            padding:20px;
        }

        h1{
            text-align:center;
        }

        #chatbox{
            height:500px;
            border:1px solid #444;
            overflow-y:auto;
            padding:10px;
            background:#1e293b;
            border-radius:10px;
        }

        .user{
            text-align:right;
            margin:10px;
            color:#38bdf8;
        }

        .bot{
            text-align:left;
            margin:10px;
            color:#4ade80;
        }

        .input-area{
            display:flex;
            margin-top:10px;
        }

        input{
            flex:1;
            padding:10px;
            font-size:16px;
        }

        button{
            padding:10px 20px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Chat Website</h1>

    <div id="chatbox"></div>

    <div class="input-area">
        <input type="text" id="message" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage(){

    let input = document.getElementById("message");
    let msg = input.value.trim();

    if(msg==="") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class="user">${msg}</div>`;

    let reply = getBotReply(msg);

    setTimeout(()=>{
        chatbox.innerHTML += `<div class="bot">${reply}</div>`;
        chatbox.scrollTop = chatbox.scrollHeight;
    },500);

    input.value="";
}

function getBotReply(msg){

    msg = msg.toLowerCase();

    if(msg.includes("hello"))
        return "Hello! How can I help you?";

    if(msg.includes("who are you"))
        return "I am a simple AI chatbot.";

    if(msg.includes("time"))
        return new Date().toLocaleTimeString();

    return "I'm still learning. Please connect me to an AI API.";
}
</script>

</body>
</html>
